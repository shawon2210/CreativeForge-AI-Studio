apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: creativeforge-web-hpa
  namespace: creativeforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: creativeforge-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
