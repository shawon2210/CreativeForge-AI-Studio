apiVersion: apps/v1
kind: Deployment
metadata:
  name: creativeforge-web
  namespace: creativeforge
  labels:
    app: creativeforge-web
    tier: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: creativeforge-web
  template:
    metadata:
      labels:
        app: creativeforge-web
        tier: frontend
    spec:
      containers:
        - name: web
          image: ghcr.io/YOUR_REPO/creativeforge-web:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 15
