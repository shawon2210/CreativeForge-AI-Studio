apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: creativeforge-ingress
  namespace: creativeforge
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - creativeforge.local
        - www.creativeforge.local
      secretName: creativeforge-tls
  rules:
    - host: creativeforge.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: creativeforge-api-service
                port:
                  number: 5000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: creativeforge-api-service
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: creativeforge-web-service
                port:
                  number: 80
    - host: www.creativeforge.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: creativeforge-web-service
                port:
                  number: 80
