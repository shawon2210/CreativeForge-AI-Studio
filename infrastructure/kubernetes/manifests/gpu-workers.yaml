apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-workers
  namespace: creativeforge
  labels:
    app: ai-workers
    tier: worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ai-workers
  template:
    metadata:
      labels:
        app: ai-workers
        tier: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/YOUR_REPO/creativeforge-api:latest
          command: ["python", "workers/run_worker.py"]
          env:
            - name: ENV
              value: "production"
            - name: CREATIVEFORGE_MODE
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: database_url
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: WORKER_TYPE
              value: "gpu"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: 2000m
              memory: 4Gi
              nvidia.com/gpu: "1"
      terminationGracePeriodSeconds: 60
      # GPU node affinity — schedule only on GPU nodes
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: In
                    values:
                      - "true"
      # Toleration for GPU taints
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
