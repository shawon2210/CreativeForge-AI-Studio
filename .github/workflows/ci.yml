name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt || true

      - name: Lint frontend
        run: |
          npm run lint --workspace=apps/web || true

      - name: Lint backend
        run: |
          pip install flake8 || true
          flake8 apps/api --max-line-length=120 --exclude=__pycache__ || true

      - name: Run frontend tests
        run: |
          npm run test --workspace=apps/web || true

      - name: Run backend tests
        run: |
          pip install pytest || true
          pytest apps/api --ignore=apps/api/__pycache__ || true

      - name: Build frontend
        run: |
          npm run build --workspace=apps/web || true

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -t creativeforge-web -f infrastructure/docker/web.Dockerfile . || true
          docker build -t creativeforge-api -f infrastructure/docker/api.Dockerfile . || true
