name: Docker CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  COMPOSE_FILE: infrastructure/docker/docker-compose.ci.yml

jobs:

  # ============================================================
  # Job 1: Lint & Unit Tests (fast feedback)
  # ============================================================
  lint-and-test:
    name: "Lint & Unit Tests"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt || true

      - name: Lint frontend
        run: npm run lint --workspace=apps/web || true

      - name: Lint backend
        run: |
          pip install flake8 || true
          flake8 apps/api --max-line-length=120 --exclude=__pycache__ || true

      - name: Run frontend tests
        run: npm run test --workspace=apps/web || true

      - name: Run backend tests
        run: |
          pip install pytest || true
          pytest apps/api --ignore=apps/api/__pycache__ || true

      - name: Build frontend
        run: npm run build --workspace=apps/web || true

  # ============================================================
  # Job 2: Docker Build Check
  # ============================================================
  docker-build:
    name: "Docker Build Check"
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: |
          docker build -t creativeforge-api -f infrastructure/docker/api.Dockerfile .

      - name: Build Web image
        run: |
          docker build -t creativeforge-web -f infrastructure/docker/web.Dockerfile .

  # ============================================================
  # Job 3: Full Docker Stack Integration + E2E Tests
  # ============================================================
  docker-e2e:
    name: "Docker Stack E2E Tests"
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- Build and start full stack ----
      - name: Build and start containers
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} up -d --build

      # ---- Wait for backend to be ready ----
      - name: Wait for backend
        run: |
          timeout 90 bash -c '
          until curl -sf http://localhost:5000/docs > /dev/null 2>&1; do
            echo "Waiting for API..."
            sleep 3
          done
          echo "API is ready!"
          '

      # ---- Wait for frontend to be ready ----
      - name: Wait for frontend
        run: |
          timeout 60 bash -c '
          until curl -sf http://localhost:3000 > /dev/null 2>&1; do
            echo "Waiting for frontend..."
            sleep 3
          done
          echo "Frontend is ready!"
          '

      # ---- Verify all services are healthy ----
      - name: Check service health
        run: |
          echo "=== API Health ==="
          curl -s http://localhost:5000/health | python3 -m json.tool || true
          echo ""
          echo "=== API Routes ==="
          curl -s http://localhost:5000/openapi.json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          paths = list(d.get('paths', {}).keys())
          print(f'Total routes: {len(paths)}')
          we = [p for p in paths if 'world' in p.lower()]
          ea = [p for p in paths if 'emotion' in p.lower()]
          print(f'World Engine: {len(we)} routes')
          print(f'Emotion AI: {len(ea)} routes')
          " || true
          echo ""
          echo "=== Frontend Health ==="
          curl -s http://localhost:3000/health || true
          echo ""
          echo "=== Redis ==="
          docker compose -f ${{ env.COMPOSE_FILE }} exec -T redis redis-cli ping || true
          echo ""
          echo "=== PostgreSQL ==="
          docker compose -f ${{ env.COMPOSE_FILE }} exec -T postgres pg_isready -U admin || true

      # ---- Install Playwright ----
      - name: Install Playwright
        run: |
          cd apps/web
          npm install --legacy-peer-deps
          npx playwright install --with-deps chromium

      # ---- Run E2E Tests ----
      - name: Run Playwright E2E tests
        run: |
          cd apps/web
          npx playwright test tests/e2e/ --reporter=list
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:5000

      # ---- API Integration Tests ----
      - name: Run API integration tests
        run: |
          pip install pytest requests || true
          python3 -c "
          import urllib.request, json, sys

          BASE = 'http://localhost:5000'
          passed = 0
          failed = 0

          tests = [
              ('GET', '/health', None, 200),
              ('GET', '/docs', None, 200),
              ('POST', '/generations/', {'prompt': 'test', 'user_id': 'u1'}, 200),
              ('POST', '/world-engine/worlds/', {'name': 'Test', 'desc': 'Test', 'user_id': 'u1'}, 200),
              ('POST', '/emotion/analyze/', {'prompt': 'happy day'}, 200),
              ('POST', '/emotion/map-visuals/', {'emotion': 'happy', 'intensity': 0.8}, 200),
              ('GET', '/style-genome/user_123', None, 200),
              ('GET', '/marketplace/items/', None, 200),
              ('GET', '/future-ready/features/', None, 200),
          ]

          for method, path, body, expected in tests:
              url = BASE + path
              try:
                  if body:
                      data = json.dumps(body).encode()
                      req = urllib.request.Request(url, data=data, headers={'Content-Type': 'application/json'}, method=method)
                  else:
                      req = urllib.request.Request(url, method=method)
                  resp = urllib.request.urlopen(req, timeout=10)
                  if resp.status == expected:
                      print(f'  PASS {method} {path} -> {resp.status}')
                      passed += 1
                  else:
                      print(f'  FAIL {method} {path} -> {resp.status} (expected {expected})')
                      failed += 1
              except Exception as e:
                  print(f'  FAIL {method} {path} -> {str(e)[:80]}')
                  failed += 1

          print(f'\nResults: {passed} passed, {failed} failed')
          sys.exit(1 if failed > 0 else 0)
          "

      # ---- Dump logs on failure ----
      - name: Dump container logs
        if: failure()
        run: |
          echo "=== API Logs ==="
          docker compose -f ${{ env.COMPOSE_FILE }} logs api
          echo ""
          echo "=== Web Logs ==="
          docker compose -f ${{ env.COMPOSE_FILE }} logs web
          echo ""
          echo "=== Redis Logs ==="
          docker compose -f ${{ env.COMPOSE_FILE }} logs redis
          echo ""
          echo "=== Postgres Logs ==="
          docker compose -f ${{ env.COMPOSE_FILE }} logs postgres

      # ---- Cleanup ----
      - name: Stop containers
        if: always()
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} down -v
